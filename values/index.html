  if (s2) s2.style.width = pct <= 70 ? '0%' : Math.min(100, (pct - 70) / 22 * 100) + '%';
  if (s3) s3.style.width = pct <= 92 ? '0%' : Math.min(100, (pct - 92) / 8 * 100) + '%';
  if (text) text.textContent = Math.round(pct) + '% complete';
}

function clusterOf(v) {
  return VALUE_CLUSTER[v] || 'misc';
}

// ─── Phase 1 ─────────────────────────────────────────────────────────────────

function getBatch(idx) {
  const start = idx * BATCH_SIZE;
  return ALL_VALUES.slice(start, start + BATCH_SIZE);
}

function renderPhase1() {
  const batch = getBatch(batchIndex);
  const completedSoFar = batchIndex * BATCH_SIZE;
  const totalRated = completedSoFar; // rated before this batch
  const progressText = batchIndex === 0
    ? 'Rate each value: 1 = not important, 2 = important, 3 = very important.'
    : '';

  let rowsHtml = '';
  batch.forEach((val, i) => {
    const rating = ratings[val];
    const btn1 = rating === 1 ? 'rate-btn rated-1 selected' : 'rate-btn';
    const btn2 = rating === 2 ? 'rate-btn rated-2 selected' : 'rate-btn';
    const btn3 = rating === 3 ? 'rate-btn rated-3 selected' : 'rate-btn';
    const def = DEFINITIONS[val] || '';
    rowsHtml += `
      <div class="value-row" id="vrow-${i}" data-batch-pos="${i}" data-value="${val}">
        <div class="value-info">
          <span class="value-name" id="vname-${i}">${val}</span>
          <span class="value-def">${def}</span>
        </div>
        <div class="rate-btns">
          <button class="${btn1}" onclick="rateValue('${val}', 1, ${i})">1</button>
          <button class="${btn2}" onclick="rateValue('${val}', 2, ${i})">2</button>
          <button class="${btn3}" onclick="rateValue('${val}', 3, ${i})">3</button>
        </div>
      </div>`;
  });

  const allRated = batch.every(v => ratings[v] !== undefined);
  const isLast = batchIndex === totalBatches - 1;
  const nextLabel = isLast ? 'See results →' : 'Next →';
  const nextDisabled = allRated ? '' : 'disabled';

  const backBtn = batchIndex > 0
    ? `<button class="btn" id="btn-back" onclick="goBack()">← Back</button>`
    : '';

  widget().innerHTML = `
    ${batchIndex === 0 ? `<p class="phase1-intro">Most people have never stopped to ask: what actually drives me?<br><br>You'll rate 222 values, narrow them down through head-to-head comparisons, and finish with a ranked list of your top 10 — plus a short analysis of what that combination reveals about you.<br><br><span style="color:#bbb;">Takes about 15–20 minutes.</span></p><p class="phase1-intro" style="margin-top:-0.5em;"><span style="font-size:13px;color:#aaa;">Use the number, arrow, and enter keys to navigate &nbsp;·&nbsp; 1 = less &nbsp;·&nbsp; 2 = more &nbsp;·&nbsp; 3 = most</span></p>` : ''}
    <p class="progress-label">${completedSoFar + 1}–${Math.min(completedSoFar + BATCH_SIZE, ALL_VALUES.length)} of ${ALL_VALUES.length} &nbsp;·&nbsp; Batch ${batchIndex + 1} of ${totalBatches}</p>
    ${rowsHtml}
    <div class="nav-row">
      ${backBtn}
      <button class="btn" id="btn-next" onclick="nextBatch()" ${nextDisabled}>${nextLabel}</button>
      <span class="nav-hint">Use the number, arrow, and enter keys to navigate</span>
    </div>
  `;

  updateProgress((batchIndex / totalBatches) * 70);

  // Focus the first unrated value, or first if all rated
  const focusIdx = batch.findIndex(v => ratings[v] === undefined);
  setFocus(focusIdx >= 0 ? focusIdx : 0);
}

let focusedPos = 0;

function setFocus(pos) {
  const batch = getBatch(batchIndex);
  // Clear previous
  for (let i = 0; i < batch.length; i++) {
    const el = document.getElementById(`vname-${i}`);
    if (el) el.classList.remove('focused');
  }
  focusedPos = pos;
  const el = document.getElementById(`vname-${pos}`);
  if (el) {
    el.classList.add('focused');
    el.scrollIntoView({ block: 'nearest' });
  }
}

function rateValue(val, rating, batchPos) {
  ratings[val] = rating;

  // Re-render the row buttons in place
  const row = document.getElementById(`vrow-${batchPos}`);
  if (row) {
    const btns = row.querySelectorAll('.rate-btn');
    btns[0].className = rating === 1 ? 'rate-btn rated-1 selected' : 'rate-btn';
    btns[1].className = rating === 2 ? 'rate-btn rated-2 selected' : 'rate-btn';
    btns[2].className = rating === 3 ? 'rate-btn rated-3 selected' : 'rate-btn';
  }

  // Enable Next if all rated, and auto-focus it
  const batch = getBatch(batchIndex);
  const allRated = batch.every(v => ratings[v] !== undefined);
  const nextBtn = document.getElementById('btn-next');
  if (nextBtn) {
    nextBtn.disabled = !allRated;
    if (allRated) nextBtn.focus();
  }

  // Always advance to next value in sequence
  if (batchPos + 1 < batch.length) {
    setFocus(batchPos + 1);
  }
}

function nextBatch() {
  batchIndex++;
  if (batchIndex >= totalBatches) {
    startPhase2();
  } else {
    renderPhase1();
    const batch = getBatch(batchIndex);
    const allRated = batch.every(v => ratings[v] !== undefined);
    if (allRated) {
      document.getElementById('btn-next')?.focus();
    }
  }
}

function goBack() {
  if (batchIndex > 0) {
    batchIndex--;
    renderPhase1();
    const backBtn = document.getElementById('btn-back');
    if (backBtn) {
      backBtn.focus();
      const batch = getBatch(batchIndex);
      for (let i = 0; i < batch.length; i++) {
        const el = document.getElementById(`vname-${i}`);
        if (el) el.classList.remove('focused');
      }
    }
  }
}

// Keyboard handler for phase 1
document.addEventListener('keydown', function(e) {
  const phase = currentPhase();
  if (phase === 1) {
    const batch = getBatch(batchIndex);
    const onNav = document.activeElement?.id === 'btn-next' || document.activeElement?.id === 'btn-back';

    if (e.key === '1' || e.key === '2' || e.key === '3') {
      if (!onNav) {
        e.preventDefault();
        const val = batch[focusedPos];
        if (val) rateValue(val, parseInt(e.key), focusedPos);
      }
    } else if (e.key === 'Tab') {
      e.preventDefault();
      setFocus((focusedPos + 1) % batch.length);
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (!onNav && focusedPos < batch.length - 1) {
        setFocus(focusedPos + 1);
      } else if (!onNav) {
        document.getElementById('btn-next')?.focus();
      } else if (document.activeElement?.id === 'btn-next') {
        document.getElementById('btn-back')?.focus();
      }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (onNav) {
        document.activeElement.blur();
        setFocus(batch.length - 1);
      } else if (focusedPos > 0) {
        setFocus(focusedPos - 1);
      }
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      document.getElementById('btn-back')?.focus();
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      document.getElementById('btn-next')?.focus();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (document.activeElement?.id === 'btn-back') {
        goBack();
      } else {
        const nextBtn = document.getElementById('btn-next');
        if (nextBtn && !nextBtn.disabled) nextBtn.click();
      }
    }
  } else if (phase === 2) {
    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      pickWinner(0);
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      pickWinner(1);
    }
  }
});

function currentPhase() {
  const w = widget();
  if (w.querySelector('.hth-buttons')) return 2;
  if (w.querySelector('.top-values-list')) return 3;
  return 1;
}

// ─── Phase 2 ─────────────────────────────────────────────────────────────────

let currentPair = null; // [valA, valB]
let phase2Pool = [];

function startPhase2() {
  // Include all 3s and all 2s, cap at 50 to keep head-to-head manageable
  const threes = ALL_VALUES.filter(v => ratings[v] === 3);
  const twos = ALL_VALUES.filter(v => ratings[v] === 2);
  phase2Pool = [...threes, ...twos].slice(0, 50);
  phase2StartSize = phase2Pool.length;
  matchHistory = [];

  renderPhase2();
}

function renderPhase2() {
  if (phase2Pool.length <= 10) {
    startPhase3();
    return;
  }

  currentPair = choosePair(phase2Pool);

  const remaining = phase2Pool.length;
  const elimsNeeded = remaining - 10;
  const elimsDone = phase2StartSize - remaining;
  const totalElims = phase2StartSize - 10;
  updateProgress(70 + (elimsDone / totalElims) * 22);

  widget().innerHTML = `
    <p class="hth-progress">Narrowing down &nbsp;·&nbsp; ${remaining} left</p>
    <p class="hth-prompt">Which matters more to you?</p>
    <div class="hth-buttons">
      <button class="hth-btn" id="hth-a" onclick="pickWinner(0)">${currentPair[0]}</button>
      <button class="hth-btn" id="hth-b" onclick="pickWinner(1)">${currentPair[1]}</button>
    </div>
    <p class="hth-hint">Use the left and right arrow keys to select</p>
  `;
}

function choosePair(pool) {
  // Prefer same-cluster pairs first
  const clusterMap = {};
  for (const v of pool) {
    const c = clusterOf(v);
    if (!clusterMap[c]) clusterMap[c] = [];
    clusterMap[c].push(v);
  }

  // Find a cluster with 2+ members
  const validClusters = Object.values(clusterMap).filter(g => g.length >= 2);
  if (validClusters.length > 0) {
    // Pick the largest cluster for richest comparison
    validClusters.sort((a, b) => b.length - a.length);
    const group = validClusters[0];
    // Shuffle and take first two
    const shuffled = group.slice().sort(() => Math.random() - 0.5);
    return [shuffled[0], shuffled[1]];
  }

  // Fall back to cross-cluster: pick two random different-cluster values
  const shuffled = pool.slice().sort(() => Math.random() - 0.5);
  return [shuffled[0], shuffled[1]];
}

function pickWinner(idx) {
  if (!currentPair) return;
  const winner = currentPair[idx];
  const loser = currentPair[1 - idx];

  matchHistory.push({ a: currentPair[0], b: currentPair[1], winner });
  phase2Pool = phase2Pool.filter(v => v !== loser);

  renderPhase2();
}

// ─── Phase 3 ─────────────────────────────────────────────────────────────────

function startPhase3() {
  // Rank final 10 by: number of wins, then original phase1 score
  const wins = {};
  for (const v of phase2Pool) wins[v] = 0;
  for (const m of matchHistory) {
    if (wins[m.winner] !== undefined) wins[m.winner]++;
  }

  const scored = phase2Pool.map(v => ({
    value: v,
    wins: wins[v] || 0,
    score: ratings[v] || 0,
    origIdx: ALL_VALUES.indexOf(v)
  }));
  scored.sort((a, b) => b.wins - a.wins || b.score - a.score || a.origIdx - b.origIdx);

  const top10 = scored.map(s => s.value);

  updateProgress(100);

  let listHtml = top10.map((v, i) =>
    `<li><span class="rank-num">${i + 1}</span>${v}</li>`
  ).join('');

  widget().innerHTML = `
    <p class="results-heading">
      Your top 10 values
      <button class="copy-btn" onclick="copyResults()" title="Copy list and analysis">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </p>
    <ul class="top-values-list">${listHtml}</ul>
    <p class="analysis-loading" id="analysis-status">Getting your analysis...</p>
    <div id="analysis-output"></div>
    <div class="start-over"><a href="#" onclick="startOver(); return false;">Start over</a></div>
  `;

  fetchAnalysis(top10);
}

async function fetchAnalysis(top10) {
  const statusEl = document.getElementById('analysis-status');
  const outputEl = document.getElementById('analysis-output');

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: top10 })
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const data = await response.json();
    const text = data.analysis || '';

    statusEl.style.display = 'none';

    // Split into paragraphs and render
    const paragraphs = text.split(/\n\n+/).filter(p => p.trim());
    outputEl.innerHTML = `<div class="analysis-text">${paragraphs.map(p => `<p>${p.trim()}</p>`).join('')}</div>`;

  } catch (err) {
    statusEl.style.display = 'none';
    outputEl.innerHTML = `<p class="analysis-error">Couldn't load analysis. Check your connection and try again.</p>`;
  }
}

// ─── Copy results ─────────────────────────────────────────────────────────────

function copyResults() {
  const listItems = document.querySelectorAll('.top-values-list li');
  const valueLines = Array.from(listItems).map((li, i) => `${i + 1}. ${li.textContent.trim()}`).join('\n');
  const analysisEl = document.getElementById('analysis-output');
  const analysisText = analysisEl ? analysisEl.innerText.trim() : '';
  const text = `My top 10 values\n\n${valueLines}${analysisText ? '\n\n' + analysisText : ''}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    if (btn) {
      btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#0864c7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
      setTimeout(() => {
        btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
      }, 2000);
    }
  });
}

// ─── Start over ───────────────────────────────────────────────────────────────

function startOver() {
  ratings = {};
  batchIndex = 0;
  phase2Pool = [];
  matchHistory = [];
  currentPair = null;
  focusedPos = 0;
  phase2StartSize = 30;
  updateProgress(0);
  renderPhase1();
}

// ─── Init ─────────────────────────────────────────────────────────────────────

renderPhase1();
</script>
</div>
</body>
</html>
