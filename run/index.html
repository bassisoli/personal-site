const START = 250; // 4:10 AM nominal (midpoint of 4:00–4:20 window)
const HALF = 27.665;
const PACE1 = 10.5;
const PACE2 = 11.0;
const TOTAL = 55.33;

// Live tracking
const LIVE_PACE = 10.5; // 10:30/mile
const LOCATION_URL = 'https://christianhales.com/race-location';
const MDT_OFFSET_MS = -6 * 3600000; // UTC-6 (Mountain Daylight Time)
let liveData = null; // set when tracking is active
const aidMarkers = [];

const AID_STATIONS = [
  { name: "Smith\'s — Lehi", coords: [40.4296, -111.8247] },
  { name: "Draper City Park", coords: [40.4933, -111.8629] },
  { name: "Trader Joe\'s — Cottonwood Heights", coords: [40.6236, -111.8541] },
  { name: "Harmons — Brickyard Plaza", coords: [40.7013, -111.8577] },
  { name: "Fort Douglas Parade Ground", coords: [40.7653, -111.8326] },
];

function haversine(a, b) {
  const R = 3958.8;
  const dLat = (b[0] - a[0]) * Math.PI / 180;
  const dLon = (b[1] - a[1]) * Math.PI / 180;
  const lat1 = a[0] * Math.PI / 180;
  const lat2 = b[0] * Math.PI / 180;
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(h));
}

const cumDist = [0];
for (let i = 1; i < COORDS.length; i++) {
  cumDist.push(cumDist[i-1] + haversine(COORDS[i-1], COORDS[i]));
}

function timeAtMile(miles) {
  if (miles <= HALF) return START + miles * PACE1;
  return START + HALF * PACE1 + (miles - HALF) * PACE2;
}

function fmt(minutes) {
  let h = Math.floor(minutes / 60) % 24;
  let m = Math.round(minutes % 60);
  if (m >= 60) { h++; m -= 60; }
  const ampm = h >= 12 ? 'PM' : 'AM';
  return (h % 12 || 12) + ':' + String(m).padStart(2, '0') + ' ' + ampm;
}

function nearestIdx(latlng) {
  let min = Infinity, idx = 0;
  for (let i = 0; i < COORDS.length; i++) {
    const d = haversine([latlng.lat, latlng.lng], COORDS[i]);
    if (d < min) { min = d; idx = i; }
  }
  return { idx, dist: min };
}

function windowAt(miles) {
  if (miles <= 10) return { early: 0, late: 10 };
  const t = (miles - 10) / (TOTAL - 10);
  return { early: t * 60, late: 10 + t * 50 };
}

function popupHtml(label, miles) {
  if (liveData && miles > liveData.mile) {
    const eta = liveData.timeMin + (miles - liveData.mile) * LIVE_PACE;
    return '<div class="popup-inner"><strong>' + label + '</strong><br>Mile ' + miles.toFixed(1) +
      '<div class="window">ETA: <strong>' + fmt(eta) + '</strong> <span style="color:#27ae60;font-size:11px">● live</span>' +
      '<br><span style="color:#999;font-size:11px">potential window: ' + fmt(eta - 10) + ' &ndash; ' + fmt(eta + 10) + '</span></div></div>';
  }
  const mid = timeAtMile(miles);
  const { early, late } = windowAt(miles);
  return '<div class="popup-inner"><strong>' + label + '</strong><br>Mile ' + miles.toFixed(1) +
    '<div class="window">' + fmt(mid - early) + ' &ndash; ' + fmt(mid + late) + '</div></div>';
}

const map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

const line = L.polyline(COORDS, { color: '#0864c7', weight: 3, opacity: 0.85 }).addTo(map);
map.fitBounds(line.getBounds(), { padding: [30, 30] });

let clickMarker = null;
map.on('click', function(e) {
  const { idx, dist } = nearestIdx(e.latlng);
  if (dist > 0.3) return;
  const snap = COORDS[idx];
  if (clickMarker) map.removeLayer(clickMarker);
  clickMarker = L.circleMarker(snap, {
    radius: 6, color: '#0864c7', fillColor: '#0864c7', fillOpacity: 1, weight: 2
  }).addTo(map);
  clickMarker.bindPopup(popupHtml('This spot', cumDist[idx])).openPopup();
});

const aidIcon = () => L.divIcon({
  className: '',
  html: '<div style="background:#c0392b;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.35)"></div>',
  iconSize: [16, 16],
  iconAnchor: [8, 8],
  popupAnchor: [0, -10]
});

AID_STATIONS.forEach(s => {
  const { idx } = nearestIdx({ lat: s.coords[0], lng: s.coords[1] });
  const m = L.marker(COORDS[idx], { icon: aidIcon() });
  m._mile = cumDist[idx];
  m._name = s.name;
  m.bindPopup(popupHtml(s.name, cumDist[idx])).addTo(map);
  aidMarkers.push(m);
});

// Live tracking
let liveMarker = null;

function fmtAge(isoString) {
  const mins = Math.round((Date.now() - new Date(isoString).getTime()) / 60000);
  if (mins < 1) return 'just now';
  return mins + ' min ago';
}

function makeLiveIcon() {
  return L.divIcon({
    className: '',
    html: '<div class="live-dot"></div>',
    iconSize: [18, 18],
    iconAnchor: [9, 9],
    popupAnchor: [0, -12]
  });
}

async function pollLocation() {
  try {
    const r = await fetch(LOCATION_URL);
    const data = await r.json();
    if (!data.active) return;

    // Snap to nearest route point
    const { idx } = nearestIdx({ lat: data.lat, lng: data.lng });
    const mile = cumDist[idx];

    // Convert UTC timestamp → minutes since midnight in MDT (UTC-6)
    const d = new Date(data.timestamp);
    const mdt = new Date(d.getTime() + MDT_OFFSET_MS);
    const timeMin = mdt.getUTCHours() * 60 + mdt.getUTCMinutes() + mdt.getUTCSeconds() / 60;

    liveData = { mile, timeMin, timestamp: data.timestamp };

    // Update live marker
    if (liveMarker) map.removeLayer(liveMarker);
    liveMarker = L.marker(COORDS[idx], { icon: makeLiveIcon(), zIndexOffset: 1000 })
      .bindPopup('<div class="popup-inner"><strong>Christian</strong><br>Mile ' + mile.toFixed(1) +
        '<br><span style="color:#777">Updated ' + fmtAge(data.timestamp) + '</span></div>')
      .addTo(map);

    // Refresh all aid station popups with live ETAs
    aidMarkers.forEach(m => m.setPopupContent(popupHtml(m._name, m._mile)));

    // Status bar
    const remaining = TOTAL - mile;
    const finishEta = timeMin + remaining * LIVE_PACE;
    const status = document.getElementById('live-status');
    status.style.display = 'block';
    status.innerHTML = '● Mile ' + mile.toFixed(1) + ' of ' + TOTAL.toFixed(1) +
      ' &nbsp;·&nbsp; Updated ' + fmtAge(data.timestamp) +
      ' &nbsp;·&nbsp; Finish ETA: <strong>' + fmt(finishEta) + '</strong>';
  } catch (e) {}
}

pollLocation();
setInterval(pollLocation, 30000);

// Map toggle
function toggleMap() {
  const section = document.getElementById('map-section');
  const btn = document.getElementById('map-toggle');
  const visible = section.style.display !== 'none';
  section.style.display = visible ? 'none' : 'block';
  btn.textContent = visible ? 'Show route map' : 'Hide route map';
  if (!visible) map.invalidateSize();
}

const MEDIA_PRESIGN_URL = 'https://christianhales.com/race-media/presign';
const MAX_SIZE = 200 * 1024 * 1024;

function dragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
function dragLeave() { document.getElementById('drop-zone').classList.remove('drag-over'); }
function drop(e) { e.preventDefault(); dragLeave(); handleFiles(e.dataTransfer.files); }

async function handleFiles(files) {
  const status = document.getElementById('upload-status');
  for (let file of files) {
    if (file.size > MAX_SIZE) { status.textContent = file.name + ' is too large (max 200MB)'; continue; }
    // Convert HEIC to JPEG
    const isHeic = file.type === 'image/heic' || file.type === 'image/heif' ||
      file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif');
    if (isHeic) {
      status.textContent = 'Converting ' + file.name + ' to JPEG…';
      try {
        let result = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.85 });
        if (Array.isArray(result)) result = result[0];
        const newName = file.name.replace(/\.heic$/i, '.jpg').replace(/\.heif$/i, '.jpg');
        file = new File([result], newName, { type: 'image/jpeg' });
      } catch (e) { status.textContent = 'Could not convert ' + file.name + ' — try saving as JPEG first'; continue; }
    }
    status.textContent = 'Uploading ' + file.name + '…';
    try {
      const presignRes = await fetch(MEDIA_PRESIGN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: file.name, type: file.type, size: file.size })
      }).then(r => r.json());

      if (presignRes.error === 'storage_full') { status.textContent = 'Storage is full — no more uploads can be accepted.'; continue; }

      await fetch(presignRes.uploadUrl, { method: 'PUT', body: file, headers: { 'Content-Type': file.type } });
      status.textContent = file.name + ' uploaded!';
    } catch (e) {
      status.textContent = 'Upload failed for ' + file.name;
    }
  }
  setTimeout(() => { status.textContent = ''; loadGallery(); }, 1500);
}

// Admin mode — enabled at /run/admin
const IS_ADMIN = sessionStorage.getItem('holy_admin') === '1';
const ADMIN_TOKEN = 'f0834398c9725166dc972d33854e7a38';
const MEDIA_DELETE_URL = 'https://christianhales.com/race-media/delete/';

async function deleteItem(key, el) {
  if (!confirm('Delete this photo/video?')) return;
  await fetch(MEDIA_DELETE_URL + key + '?token=' + ADMIN_TOKEN, { method: 'DELETE' });
  el.closest('.gallery-item').remove();
}

// Gallery
function openLightbox(url, isVideo) {
  const lb = document.getElementById('lightbox');
  const content = document.getElementById('lightbox-content');
  content.innerHTML = isVideo
    ? '<video src="' + url + '" controls autoplay style="max-width:90vw;max-height:90vh"></video>'
    : '<img src="' + url + '" style="max-width:90vw;max-height:90vh">';
  lb.classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-content').innerHTML = '';
}

async function loadGallery() {
  const gallery = document.getElementById('gallery');
  try {
    const items = await fetch(MEDIA_LIST_URL).then(r => r.json());
    if (!items.length) { gallery.innerHTML = ''; return; }
    const fileUrl = key => 'https://pub-342f73d0fab948ecba023399b91fcf41.r2.dev/' + key;
    const deleteBtn = key => IS_ADMIN
      ? '<button onclick="deleteItem(\'' + key + '\',this)" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:24px;height:24px;font-size:14px;cursor:pointer;line-height:1;z-index:10">&times;</button>'
      : '';
    gallery.innerHTML = '<h3>Photos &amp; Videos</h3><div class="gallery-grid">' +
      items.map(item => {
        const url = fileUrl(item.key);
        const isVideo = item.type && item.type.startsWith('video');
        if (isVideo) {
          return '<div class="gallery-item" onclick="openLightbox(\'' + url + '\',true)">' +
            '<video src="' + url + '" muted playsinline preload="metadata"></video>' +
            '<div class="play-icon"></div>' + deleteBtn(item.key) + '</div>';
        }
        return '<div class="gallery-item" onclick="openLightbox(\'' + url + '\',false)">' +
          '<img src="' + url + '" loading="lazy">' + deleteBtn(item.key) + '</div>';
      }).join('') + '</div>';
  } catch (e) {}
}

loadGallery();
</script>
