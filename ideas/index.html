const API = 'https://christianhales.com/ideas-api';
let skipsUsed = 0;
const MAX_SKIPS = 2;
let currentId = null;

async function getShown() {
  try {
    const r = await fetch(API);
    return await r.json();
  } catch (e) {
    return [];
  }
}

async function markShown(id) {
  try {
    await fetch(API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id})
    });
  } catch (e) {}
}

async function generate() {
  document.getElementById('btn-generate').disabled = true;
  document.getElementById('btn-skip').disabled = true;
  document.getElementById('status').textContent = '';

  const shown = await getShown();
  const available = IDEAS.filter(i => !shown.includes(i.id) && i.id !== currentId);

  if (available.length === 0) {
    document.getElementById('idea-title').textContent = '';
    document.getElementById('idea-desc').textContent = '';
    document.getElementById('status').textContent = 'All ideas have been shown in the last 12 hours. Check back soon.';
    document.getElementById('btn-generate').disabled = false;
    return;
  }

  const idea = available[Math.floor(Math.random() * available.length)];
  currentId = idea.id;

  document.getElementById('idea-title').textContent = idea.title;
  document.getElementById('idea-desc').textContent = idea.desc;

  await markShown(idea.id);

  document.getElementById('btn-generate').disabled = false;
  if (skipsUsed < MAX_SKIPS) {
    document.getElementById('btn-skip').disabled = false;
  }
}

async function skip() {
  if (skipsUsed >= MAX_SKIPS) return;
  skipsUsed++;
  if (skipsUsed >= MAX_SKIPS) {
    document.getElementById('btn-skip').disabled = true;
  }
  await generate();
}
</script>
